<svg width="1200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="fg">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="fng" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="50%" style="stop-color:#00ffcc"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" rx="16" fill="url(#fbg)"/>

  <!-- Matrix rain characters (decorative) -->
  <g font-family="'Courier New', monospace" font-size="10" opacity="0.12" fill="#00ffcc">
    <text x="50" y="30">01001000 01100101</text>
    <text x="300" y="25">11010010 01110010</text>
    <text x="550" y="35">01100001 01101010</text>
    <text x="800" y="28">10110010 01001100</text>
    <text x="100" y="175">01101111 01100011</text>
    <text x="400" y="180">01101000 01101001</text>
    <text x="700" y="170">01100010 00100001</text>
    <text x="950" y="178">11111111 00000000</text>
  </g>

  <!-- Top line -->
  <line x1="100" y1="45" x2="1100" y2="45" stroke="url(#fng)" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Main text -->
  <text x="600" y="85" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="url(#fng)" text-anchor="middle" filter="url(#fg)">
    DHIRAJ LOCHIB
  </text>

  <!-- Subtitle -->
  <text x="600" y="115" font-family="'Courier New', monospace" font-size="14" fill="#888" text-anchor="middle">
    FULL STACK  ·  AI/ML  ·  BLOCKCHAIN  ·  CLOUD  ·  DEVOPS
  </text>

  <!-- Location & tagline -->
  <text x="600" y="142" font-family="'Courier New', monospace" font-size="12" fill="#555" text-anchor="middle">
    📍 Jaipur, India  ·  "I don't dream in code. I architect in it."
  </text>

  <!-- Bottom line -->
  <line x1="100" y1="160" x2="1100" y2="160" stroke="url(#fng)" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="198" rx="16" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.2">
    <animate attributeName="stroke" values="#ff00ff;#00ffcc;#ff00ff" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>