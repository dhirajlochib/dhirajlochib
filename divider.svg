<svg width="1200" height="30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dg">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="dl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#ff00ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00ffcc;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#ff00ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <line x1="50" y1="15" x2="1150" y2="15" stroke="url(#dl)" stroke-width="2" filter="url(#dg)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </line>
  <circle cx="600" cy="15" r="4" fill="#00ffcc" filter="url(#dg)">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Traveling dot -->
  <circle r="3" fill="#ff00ff" filter="url(#dg)">
    <animate attributeName="cx" values="50;1150;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="15;15;15" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>