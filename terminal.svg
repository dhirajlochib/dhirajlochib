<svg width="1000" height="520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <clipPath id="termClip">
      <rect x="15" y="50" width="970" height="455" rx="8"/>
    </clipPath>
  </defs>

  <!-- Terminal window -->
  <rect width="1000" height="520" rx="15" fill="#0a0a0a" stroke="#333" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="1000" height="45" rx="15" fill="#1a1a1a"/>
  <rect y="30" width="1000" height="15" fill="#1a1a1a"/>

  <!-- Window buttons -->
  <circle cx="30" cy="22" r="7" fill="#ff5f56"/>
  <circle cx="55" cy="22" r="7" fill="#ffbd2e"/>
  <circle cx="80" cy="22" r="7" fill="#27c93f"/>

  <!-- Title text -->
  <text x="500" y="28" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#888" text-anchor="middle">dhiraj@arch — ~/portfolio — zsh</text>

  <!-- Terminal content area -->
  <g clip-path="url(#termClip)">
    <!-- Scanlines overlay -->
    <rect x="15" y="50" width="970" height="455" fill="url(#termGrad)" opacity="0.3"/>

    <!-- Line 1: whoami -->
    <text x="30" y="85" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#ff00ff" filter="url(#glow2)">❯</text>
    <text x="50" y="85" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#00ffcc" filter="url(#glow2)">whoami</text>
    <text x="30" y="110" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#e0e0e0">Dhiraj Lochib — Full Stack Architect × AI/ML Engineer × Web3 Builder</text>

    <!-- Line 2: location -->
    <text x="30" y="145" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#ff00ff" filter="url(#glow2)">❯</text>
    <text x="50" y="145" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#00ffcc" filter="url(#glow2)">cat /etc/location</text>
    <text x="30" y="170" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#e0e0e0">📍 Jaipur, Rajasthan (Pink City) — India 🇮🇳</text>

    <!-- Line 3: skills -->
    <text x="30" y="205" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#ff00ff" filter="url(#glow2)">❯</text>
    <text x="50" y="205" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#00ffcc" filter="url(#glow2)">ls ~/skills --sort=mastery</text>

    <text x="30" y="232" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#ffbd2e">FRONTEND</text>
    <text x="130" y="232" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#888">React · Next.js · Vue · Svelte · TypeScript · Flutter</text>

    <text x="30" y="255" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#27c93f">BACKEND</text>
    <text x="130" y="255" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#888">Node.js · Go · Rust · Python · FastAPI · NestJS</text>

    <text x="30" y="278" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#ff5f56">DATABASE</text>
    <text x="130" y="278" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#888">PostgreSQL · MongoDB · Redis · Pinecone · Supabase</text>

    <text x="30" y="301" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#00ffcc">AI / ML</text>
    <text x="130" y="301" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#888">PyTorch · TensorFlow · LangChain · HuggingFace · OpenCV</text>

    <text x="30" y="324" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#ff00ff">WEB3</text>
    <text x="130" y="324" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#888">Solidity · Ethereum · Hardhat · Foundry · IPFS</text>

    <text x="30" y="347" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#5f87ff">DEVOPS</text>
    <text x="130" y="347" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#888">Docker · K8s · Terraform · AWS · GCP · CI/CD</text>

    <!-- Line 4: languages -->
    <text x="30" y="382" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#ff00ff" filter="url(#glow2)">❯</text>
    <text x="50" y="382" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#00ffcc" filter="url(#glow2)">echo $LANGUAGES</text>
    <text x="30" y="407" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#e0e0e0">Hindi ████████████ 100%  ·  Marwadi ████████████ 100%  ·  English █████████░░ 80%</text>

    <!-- Line 5: status -->
    <text x="30" y="442" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#ff00ff" filter="url(#glow2)">❯</text>
    <text x="50" y="442" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#00ffcc" filter="url(#glow2)">systemctl status dhiraj.service</text>
    <text x="30" y="467" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#27c93f">● Active: running (building the future) since birth</text>
    <text x="30" y="487" font-family="'SF Mono', 'Courier New', monospace" font-size="13" fill="#888">  Memory: ∞ · CPU: overclocked · Motivation: 100%</text>

    <!-- Cursor blink -->
    <rect x="30" y="498" width="10" height="16" fill="#00ffcc">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Subtle border glow -->
  <rect x="1" y="1" width="998" height="518" rx="15" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.3">
    <animate attributeName="stroke" values="#ff00ff;#00ffcc;#ff00ff" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>