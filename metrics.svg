<svg width="1000" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="mg">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="120" rx="12" fill="#0a0a0a"/>

  <!-- Metric 1: Languages -->
  <g transform="translate(30, 15)">
    <rect width="180" height="90" rx="10" fill="#0d0d0d" stroke="#ff00ff" stroke-width="1" opacity="0.8"/>
    <text x="90" y="30" font-family="'Courier New', monospace" font-size="10" fill="#ff00ff" text-anchor="middle" opacity="0.7">LANGUAGES</text>
    <text x="90" y="58" font-family="'Courier New', monospace" font-size="28" fill="#ff00ff" text-anchor="middle" font-weight="bold" filter="url(#mg)">15+</text>
    <text x="90" y="78" font-family="'Courier New', monospace" font-size="9" fill="#666" text-anchor="middle">Programming &amp; Markup</text>
  </g>

  <!-- Metric 2: Frameworks -->
  <g transform="translate(225, 15)">
    <rect width="180" height="90" rx="10" fill="#0d0d0d" stroke="#00ffcc" stroke-width="1" opacity="0.8"/>
    <text x="90" y="30" font-family="'Courier New', monospace" font-size="10" fill="#00ffcc" text-anchor="middle" opacity="0.7">FRAMEWORKS</text>
    <text x="90" y="58" font-family="'Courier New', monospace" font-size="28" fill="#00ffcc" text-anchor="middle" font-weight="bold" filter="url(#mg)">30+</text>
    <text x="90" y="78" font-family="'Courier New', monospace" font-size="9" fill="#666" text-anchor="middle">Battle-Tested</text>
  </g>

  <!-- Metric 3: Databases -->
  <g transform="translate(420, 15)">
    <rect width="180" height="90" rx="10" fill="#0d0d0d" stroke="#ff00ff" stroke-width="1" opacity="0.8"/>
    <text x="90" y="30" font-family="'Courier New', monospace" font-size="10" fill="#ff00ff" text-anchor="middle" opacity="0.7">DATABASES</text>
    <text x="90" y="58" font-family="'Courier New', monospace" font-size="28" fill="#ff00ff" text-anchor="middle" font-weight="bold" filter="url(#mg)">20+</text>
    <text x="90" y="78" font-family="'Courier New', monospace" font-size="9" fill="#666" text-anchor="middle">SQL / NoSQL / Vector</text>
  </g>

  <!-- Metric 4: Cloud -->
  <g transform="translate(615, 15)">
    <rect width="180" height="90" rx="10" fill="#0d0d0d" stroke="#00ffcc" stroke-width="1" opacity="0.8"/>
    <text x="90" y="30" font-family="'Courier New', monospace" font-size="10" fill="#00ffcc" text-anchor="middle" opacity="0.7">CLOUD TOOLS</text>
    <text x="90" y="58" font-family="'Courier New', monospace" font-size="28" fill="#00ffcc" text-anchor="middle" font-weight="bold" filter="url(#mg)">25+</text>
    <text x="90" y="78" font-family="'Courier New', monospace" font-size="9" fill="#666" text-anchor="middle">DevOps &amp; Infra</text>
  </g>

  <!-- Metric 5: Coffee -->
  <g transform="translate(810, 15)">
    <rect width="160" height="90" rx="10" fill="#0d0d0d" stroke="#ff00ff" stroke-width="1" opacity="0.8"/>
    <text x="80" y="30" font-family="'Courier New', monospace" font-size="10" fill="#ff00ff" text-anchor="middle" opacity="0.7">COFFEE CUPS</text>
    <text x="80" y="58" font-family="'Courier New', monospace" font-size="28" fill="#ff00ff" text-anchor="middle" font-weight="bold" filter="url(#mg)">∞</text>
    <text x="80" y="78" font-family="'Courier New', monospace" font-size="9" fill="#666" text-anchor="middle">And Counting...</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="998" height="118" rx="12" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.2">
    <animate attributeName="stroke" values="#ff00ff;#00ffcc;#ff00ff" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>